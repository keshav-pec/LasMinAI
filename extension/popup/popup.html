<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LasMinAI Everywhere</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 300px;
      padding: 20px;
      text-align: center;
      background-color: #111827;
      color: white;
      margin: 0;
    }
    h1 { font-size: 18px; margin-bottom: 10px; }
    p { font-size: 14px; color: #9ca3af; margin-bottom: 20px; }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #1d4ed8; }
    #status {
      margin-top: 15px;
      font-size: 12px;
      color: #10b981;
      display: none;
    }
  </style>
</head>
<body>
  <h1>LasMinAI Everywhere</h1>
  <p id="message">Please log in to the web app to connect your extension.</p>
  <button id="loginBtn">Open Web App to Login</button>
  <div id="status">✅ Connected to LasMinAI</div>
  <script src="popup.js"></script>
</body>
</html>
