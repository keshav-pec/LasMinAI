<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LasMinAI</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 240px;
      margin: 0;
      background-color: #0f172a;
      color: #f8fafc;
      border-radius: 12px;
    }
    
    .content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Auth Section */
    .auth-section {
      text-align: center;
    }
    .auth-section p {
      font-size: 12px;
      color: #94a3b8;
      margin: 0 0 8px 0;
      line-height: 1.4;
    }
    .btn {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .status-success {
      display: none;
      font-size: 11px;
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 6px;
      border-radius: 6px;
      text-align: center;
      font-weight: 500;
    }

    /* Card */
    .card {
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px;
    }

    .domain-title {
      font-size: 11px;
      color: #94a3b8;
      margin: 0 0 10px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .domain-name {
      color: #f8fafc;
      font-weight: 600;
      font-size: 12px;
      word-break: break-all;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid #334155;
    }
    .row:first-of-type {
      border-top: none;
      padding-top: 0;
    }
    .row:last-of-type {
      padding-bottom: 0;
    }
    .row-label {
      font-size: 12px;
      font-weight: 500;
    }

    /* Small Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #475569;
      transition: .2s;
      border-radius: 18px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #3b82f6;
    }
    input:checked + .slider:before {
      transform: translateX(14px);
    }
    input:disabled + .slider {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  
  <div class="content">
    <div class="auth-section">
      <div id="unauthContainer">
        <p>Log in to connect.</p>
        <button class="btn" id="loginBtn">Open Web App</button>
      </div>
      <div class="status-success" id="status">
        ✅ Connected to LasMinAI
      </div>
    </div>

    <div class="card">
      <div class="domain-title">
        <span>Current Site:</span>
        <span class="domain-name" id="currentDomain">Loading...</span>
      </div>
      
      <div class="row">
        <span class="row-label">Voice Assistant</span>
        <label class="switch">
          <input type="checkbox" id="voiceToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="row">
        <span class="row-label">Focus Reminders</span>
        <label class="switch">
          <input type="checkbox" id="remindersToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
